<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" width="800" height="450">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="100%" style="stop-color:#0d1a2e"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="nodeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1040"/>
      <stop offset="100%" style="stop-color:#2d1b69"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="450" fill="url(#bg1)"/>

  <!-- Background orbs -->
  <ellipse cx="150" cy="150" rx="200" ry="180" fill="url(#orb1)" opacity="0.6"/>
  <ellipse cx="650" cy="320" rx="180" ry="160" fill="url(#orb2)" opacity="0.5"/>

  <!-- Grid lines subtle -->
  <g opacity="0.04" stroke="#a855f7" stroke-width="1">
    <line x1="0" y1="75" x2="800" y2="75"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="225" x2="800" y2="225"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="375" x2="800" y2="375"/>
    <line x1="100" y1="0" x2="100" y2="450"/>
    <line x1="200" y1="0" x2="200" y2="450"/>
    <line x1="300" y1="0" x2="300" y2="450"/>
    <line x1="400" y1="0" x2="400" y2="450"/>
    <line x1="500" y1="0" x2="500" y2="450"/>
    <line x1="600" y1="0" x2="600" y2="450"/>
    <line x1="700" y1="0" x2="700" y2="450"/>
  </g>

  <!-- ── Neural network nodes layer 1 (input) ── -->
  <!-- Layer 1 nodes -->
  <g filter="url(#glow1)">
    <circle cx="120" cy="140" r="16" fill="url(#nodeGrad)" stroke="#7c3aed" stroke-width="1.5"/>
    <circle cx="120" cy="200" r="16" fill="url(#nodeGrad)" stroke="#7c3aed" stroke-width="1.5"/>
    <circle cx="120" cy="260" r="16" fill="url(#nodeGrad)" stroke="#7c3aed" stroke-width="1.5"/>
    <circle cx="120" cy="320" r="16" fill="url(#nodeGrad)" stroke="#7c3aed" stroke-width="1.5"/>
  </g>
  <!-- Layer 2 nodes -->
  <g filter="url(#glow1)">
    <circle cx="240" cy="160" r="16" fill="url(#nodeGrad)" stroke="#8b5cf6" stroke-width="1.5"/>
    <circle cx="240" cy="230" r="16" fill="url(#nodeGrad)" stroke="#8b5cf6" stroke-width="1.5"/>
    <circle cx="240" cy="300" r="16" fill="url(#nodeGrad)" stroke="#8b5cf6" stroke-width="1.5"/>
  </g>
  <!-- Layer 3 nodes (middle) -->
  <g filter="url(#glow1)">
    <circle cx="360" cy="145" r="18" fill="url(#nodeGrad)" stroke="#a855f7" stroke-width="2"/>
    <circle cx="360" cy="225" r="18" fill="url(#nodeGrad)" stroke="#a855f7" stroke-width="2"/>
    <circle cx="360" cy="305" r="18" fill="url(#nodeGrad)" stroke="#a855f7" stroke-width="2"/>
  </g>

  <!-- Connections layer 1→2 -->
  <g stroke="#7c3aed" stroke-width="0.8" opacity="0.3">
    <line x1="136" y1="140" x2="224" y2="160"/>
    <line x1="136" y1="140" x2="224" y2="230"/>
    <line x1="136" y1="140" x2="224" y2="300"/>
    <line x1="136" y1="200" x2="224" y2="160"/>
    <line x1="136" y1="200" x2="224" y2="230"/>
    <line x1="136" y1="200" x2="224" y2="300"/>
    <line x1="136" y1="260" x2="224" y2="160"/>
    <line x1="136" y1="260" x2="224" y2="230"/>
    <line x1="136" y1="260" x2="224" y2="300"/>
    <line x1="136" y1="320" x2="224" y2="160"/>
    <line x1="136" y1="320" x2="224" y2="230"/>
    <line x1="136" y1="320" x2="224" y2="300"/>
  </g>

  <!-- Connections layer 2→3 -->
  <g stroke="#a855f7" stroke-width="0.8" opacity="0.35">
    <line x1="256" y1="160" x2="342" y2="145"/>
    <line x1="256" y1="160" x2="342" y2="225"/>
    <line x1="256" y1="160" x2="342" y2="305"/>
    <line x1="256" y1="230" x2="342" y2="145"/>
    <line x1="256" y1="230" x2="342" y2="225"/>
    <line x1="256" y1="230" x2="342" y2="305"/>
    <line x1="256" y1="300" x2="342" y2="145"/>
    <line x1="256" y1="300" x2="342" y2="225"/>
    <line x1="256" y1="300" x2="342" y2="305"/>
  </g>

  <!-- Active highlighted connections -->
  <g stroke="#c084fc" stroke-width="1.5" opacity="0.7" filter="url(#glow1)">
    <line x1="136" y1="200" x2="224" y2="230"/>
    <line x1="256" y1="230" x2="342" y2="225"/>
  </g>

  <!-- Active nodes highlighted -->
  <circle cx="120" cy="200" r="6" fill="#a855f7" opacity="0.9" filter="url(#glow1)"/>
  <circle cx="240" cy="230" r="6" fill="#a855f7" opacity="0.9" filter="url(#glow1)"/>
  <circle cx="360" cy="225" r="6" fill="#c084fc" opacity="1" filter="url(#glow1)"/>

  <!-- ── Pipeline boxes (right side) ── -->
  <!-- RAG box -->
  <rect x="430" y="80" width="140" height="70" rx="10" fill="#0f0a2a" stroke="#7c3aed" stroke-width="1.5" opacity="0.9"/>
  <rect x="430" y="80" width="140" height="4" rx="2" fill="url(#accent1)" opacity="0.8"/>
  <text x="500" y="112" text-anchor="middle" font-family="monospace" font-size="11" fill="#a78bfa" font-weight="700">HYBRID RAG</text>
  <text x="500" y="130" text-anchor="middle" font-family="monospace" font-size="9" fill="#6d6d8a">Dense + Sparse → Pinecone</text>

  <!-- Agent box -->
  <rect x="430" y="190" width="140" height="70" rx="10" fill="#0f0a2a" stroke="#8b5cf6" stroke-width="1.5" opacity="0.9"/>
  <rect x="430" y="190" width="140" height="4" rx="2" fill="#8b5cf6" opacity="0.8"/>
  <text x="500" y="222" text-anchor="middle" font-family="monospace" font-size="11" fill="#a78bfa" font-weight="700">CONV. AGENT</text>
  <text x="500" y="240" text-anchor="middle" font-family="monospace" font-size="9" fill="#6d6d8a">LangChain + Groq Llama 3.1</text>

  <!-- DAT Agent box -->
  <rect x="430" y="300" width="140" height="70" rx="10" fill="#0f0a2a" stroke="#06b6d4" stroke-width="1.5" opacity="0.9"/>
  <rect x="430" y="300" width="140" height="4" rx="2" fill="#06b6d4" opacity="0.8"/>
  <text x="500" y="332" text-anchor="middle" font-family="monospace" font-size="11" fill="#67e8f9" font-weight="700">DAT AGENT</text>
  <text x="500" y="350" text-anchor="middle" font-family="monospace" font-size="9" fill="#6d6d8a">Binary Analysis + Hex Parse</text>

  <!-- Arrow from neural net to boxes -->
  <g stroke="#a855f7" stroke-width="1.5" opacity="0.5" marker-end="url(#arrow)">
    <line x1="378" y1="225" x2="426" y2="225"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a855f7" opacity="0.7"/>
    </marker>
  </defs>
  <!-- Arrow line -->
  <line x1="378" y1="145" x2="426" y2="115" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="378" y1="225" x2="426" y2="225" stroke="#8b5cf6" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>
  <line x1="378" y1="305" x2="426" y2="335" stroke="#06b6d4" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5"/>

  <!-- Right side: output / metrics -->
  <rect x="610" y="100" width="150" height="250" rx="12" fill="#080d1c" stroke="#1e1040" stroke-width="1.5"/>

  <!-- Metric rows -->
  <text x="685" y="128" text-anchor="middle" font-family="monospace" font-size="9" fill="#6d6d8a" text-transform="uppercase">RETRIEVAL SCORE</text>
  <rect x="625" y="135" width="120" height="6" rx="3" fill="#1e1040"/>
  <rect x="625" y="135" width="96" height="6" rx="3" fill="#7c3aed" opacity="0.8"/>

  <text x="685" y="162" text-anchor="middle" font-family="monospace" font-size="9" fill="#6d6d8a">CONTEXT WINDOW</text>
  <rect x="625" y="168" width="120" height="6" rx="3" fill="#1e1040"/>
  <rect x="625" y="168" width="108" height="6" rx="3" fill="#8b5cf6" opacity="0.8"/>

  <text x="685" y="196" text-anchor="middle" font-family="monospace" font-size="9" fill="#6d6d8a">MEMORY DEPTH</text>
  <rect x="625" y="202" width="120" height="6" rx="3" fill="#1e1040"/>
  <rect x="625" y="202" width="78" height="6" rx="3" fill="#a855f7" opacity="0.8"/>

  <text x="685" y="230" text-anchor="middle" font-family="monospace" font-size="9" fill="#6d6d8a">BM25 SPARSE</text>
  <rect x="625" y="236" width="120" height="6" rx="3" fill="#1e1040"/>
  <rect x="625" y="236" width="102" height="6" rx="3" fill="#06b6d4" opacity="0.7"/>

  <!-- Divider -->
  <line x1="625" y1="264" x2="760" y2="264" stroke="#1e1040" stroke-width="1"/>

  <!-- Stats -->
  <text x="650" y="288" text-anchor="middle" font-family="monospace" font-size="18" fill="#a855f7" font-weight="700">3</text>
  <text x="650" y="304" text-anchor="middle" font-family="monospace" font-size="8" fill="#6d6d8a">PIPELINES</text>
  <text x="720" y="288" text-anchor="middle" font-family="monospace" font-size="18" fill="#06b6d4" font-weight="700">∞</text>
  <text x="720" y="304" text-anchor="middle" font-family="monospace" font-size="8" fill="#6d6d8a">CONTEXT</text>

  <!-- Title area bottom -->
  <rect x="0" y="390" width="800" height="60" fill="#050810" opacity="0.7"/>
  <text x="40" y="420" font-family="monospace" font-size="13" fill="#a78bfa" font-weight="700">NLP &amp; LLM APPLICATION SUITE</text>
  <text x="40" y="438" font-family="monospace" font-size="9" fill="#4a4a6a">RAG · Conversational AI · Agentic Systems · Vector Databases</text>

  <!-- Floating token chips -->
  <rect x="580" y="400" width="48" height="18" rx="9" fill="#1e1040" stroke="#7c3aed" stroke-width="1"/>
  <text x="604" y="413" text-anchor="middle" font-family="monospace" font-size="8" fill="#a78bfa">Pinecone</text>
  <rect x="634" y="400" width="36" height="18" rx="9" fill="#1e1040" stroke="#06b6d4" stroke-width="1"/>
  <text x="652" y="413" text-anchor="middle" font-family="monospace" font-size="8" fill="#67e8f9">Groq</text>
  <rect x="676" y="400" width="48" height="18" rx="9" fill="#1e1040" stroke="#8b5cf6" stroke-width="1"/>
  <text x="700" y="413" text-anchor="middle" font-family="monospace" font-size="8" fill="#a78bfa">LangChain</text>
  <rect x="730" y="400" width="36" height="18" rx="9" fill="#1e1040" stroke="#7c3aed" stroke-width="1"/>
  <text x="748" y="413" text-anchor="middle" font-family="monospace" font-size="8" fill="#a78bfa">BM25</text>
</svg>
